name: api-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    env:
      NUGET_FEED_URL: ${{ secrets.NUGET_FEED_URL }}
      NUGET_FEED_USERNAME: ${{ secrets.NUGET_FEED_USERNAME }}
      NUGET_FEED_TOKEN: ${{ secrets.NUGET_FEED_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: |
          if [ -n "$NUGET_FEED_URL" ] && [ -n "$NUGET_FEED_USERNAME" ] && [ -n "$NUGET_FEED_TOKEN" ]; then
            dotnet restore Thunderbird.Platform.slnx --configfile nuget.config
          else
            cat > /tmp/nuget-public.config <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <configuration>
              <packageSources>
                <clear />
                <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
              </packageSources>
            </configuration>
            EOF
            dotnet restore Thunderbird.Platform.slnx --configfile /tmp/nuget-public.config
          fi
      - name: Build
        run: dotnet build Thunderbird.Platform.slnx --no-restore -c Release
      - name: Test
        run: dotnet test Thunderbird.Platform.slnx --no-build -c Release
